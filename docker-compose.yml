version: "3.9"

services:
  backend:
    build: ./backend
    container_name: virat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: virat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped